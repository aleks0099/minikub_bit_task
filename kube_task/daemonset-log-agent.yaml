apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-log-agent
spec:
  selector:
    matchLabels:
      app: my-log-agent
  template:
    metadata:
      labels:
        app: my-log-agent
    spec:
      containers:
        - name: log-agent
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - "tail -n +1 -F /var/log/pods/*/my-app/*.log 2>/dev/null"
          volumeMounts:
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
