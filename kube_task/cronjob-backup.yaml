apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-log-backup
spec:
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - >
                  ts=$(date +%Y%m%d-%H%M%S);
                  mkdir -p /app/logs;
                  wget -q -O /app/logs/app.log http://my-app-svc/logs;
                  tar -czf /tmp/app-logs-${ts}.tar.gz /app/logs/;
                  ls -lah /tmp/app-logs-*.tar.gz;
                  sleep 600;
